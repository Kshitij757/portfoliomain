<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kshitij Lodhi — Portfolio</title>
  <meta name="description" content="Kshitij Lodhi — CS Engineering Student. I build, solve, and ship." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══ RESET ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #0a0d12;
      --dark-2: #111520;
      --dark-3: #181d2a;
      --light: #f0f4ff;
      --cyan: #00e5ff;
      --cyan-dim: #009ab5;
      --grey: #8899aa;
      --grey-dark: #445566;
      --white: #ffffff;
      --shadow: 6px 6px 0 #000;
      --shadow-sm: 4px 4px 0 #000;
      --shadow-cyan: 6px 6px 0 var(--cyan-dim);
      --font-display: 'Dela Gothic One', sans-serif;
      --font-body: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; background: var(--dark); color: var(--light); }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 0v24M0 12h24" stroke="white" stroke-width="1.5"/></svg>') 12 12, crosshair;
    }

    a, button, input, textarea, .hamburger, [role="button"], .social-btn, .work-btn, .download-btn {
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 0v24M0 12h24" stroke="%2300e5ff" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="%2300e5ff"/></svg>') 12 12, pointer !important;
    }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--grey-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

    /* ═══ NOISE OVERLAY ═══ */
    .noise-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 200px 200px;
    }

    /* ═══ NAVBAR ═══ */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 32px; display: flex; align-items: center;
      justify-content: space-between; transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }
    .navbar.scrolled {
      background: rgba(10, 13, 18, 0.9);
      backdrop-filter: blur(16px) saturate(180%);
      border-bottom-color: #1a2030;
    }
    .nav-logo {
      font-family: var(--font-display); font-size: clamp(1rem, 2vw, 1.3rem);
      color: var(--white); text-decoration: none; letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--cyan); }
    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a {
      font-family: var(--font-body); font-size: 0.72rem; color: var(--grey);
      text-decoration: none; padding: 7px 14px; border: 2px solid transparent;
      transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px;
    }
    .nav-links a:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0,229,255,0.05); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; border: none; background: none; padding: 8px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); transition: all 0.3s ease; }
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 99; background: var(--dark);
      flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--font-display); font-size: clamp(2rem, 8vw, 3.5rem);
      color: var(--white); text-decoration: none; transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--cyan); }

    /* ═══ SECTION ═══ */
    .section { padding: 100px 0; position: relative; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
    .section-title {
      font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--white); text-transform: uppercase; margin-bottom: 48px;
      display: flex; align-items: center; gap: 16px;
    }
    .section-title .num { color: var(--cyan); font-size: 0.65em; opacity: 0.7; }

    /* ═══ HERO ═══ */
    .hero { min-height: 100vh; display: flex; align-items: center; padding-top: 80px; }
    .hero-grid {
      display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 60px;
      align-items: center; width: 100%;
    }
    .hero-slogan {
      font-family: var(--font-display); font-size: clamp(2.5rem, 6vw, 5rem);
      color: var(--white); line-height: 1.05; text-transform: uppercase; margin-bottom: 8px;
    }
    .hero-slogan .cyan { color: var(--cyan); }
    .hero-sub {
      font-family: var(--font-body); font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: var(--cyan); margin-bottom: 32px; letter-spacing: 3px;
    }
    .hero-socials { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border: 2px solid #1e2a3a; background: var(--dark-2);
      color: var(--grey); text-decoration: none; transition: all 0.2s ease;
    }
    .social-btn:hover {
      border-color: var(--cyan); color: var(--cyan);
      transform: translate(-3px, -3px); box-shadow: 3px 3px 0 var(--cyan-dim);
    }
    .work-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 24px; height: 48px; font-family: var(--font-body); font-size: 0.8rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--white);
      background: var(--dark-2); border: 2px solid var(--grey-dark);
      transition: all 0.2s ease; text-decoration: none;
    }
    .work-btn:hover { border-color: var(--cyan); color: var(--cyan); transform: translate(-3px,-3px); box-shadow: var(--shadow-sm); }
    .download-wrapper { position: relative; width: 48px; height: 48px; }
    .download-btn {
      position: absolute; top: 0; left: 0; display: inline-flex; align-items: center;
      padding: 0 12px; height: 48px; font-family: var(--font-body); font-size: 0.8rem;
      font-weight: 700; color: var(--dark); background: var(--cyan); border: 2px solid #000;
      box-shadow: var(--shadow); text-decoration: none; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden;
      white-space: nowrap; width: 48px; z-index: 50;
    }
    .download-btn svg { flex-shrink: 0; }
    .download-btn:hover { width: 145px; transform: translate(-3px,-3px); box-shadow: 6px 6px 0 #000; }
    .download-text { opacity: 0; margin-left: 10px; transition: opacity 0.2s 0.1s; }
    .download-btn:hover .download-text { opacity: 1; }

    /* Hero Right Panel */
    .hero-right {
      height: 400px; position: relative; display: flex; align-items: center; justify-content: center;
    }
    .floating-icon {
      position: absolute; font-size: 2rem; animation: floatAnim 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(0,229,255,0.4));
    }
    .icon-1 { top: 10%; left: 5%; animation-delay: 0s; }
    .icon-2 { top: 15%; right: 10%; animation-delay: 0.7s; }
    .icon-3 { bottom: 20%; left: 10%; animation-delay: 1.4s; }
    .icon-4 { bottom: 15%; right: 5%; animation-delay: 2.1s; }
    @keyframes floatAnim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .info-card {
      width: 80%; max-width: 320px; padding: 32px;
      background: var(--dark-2); border: 2px solid #1e2a3a;
      box-shadow: 8px 8px 0 var(--cyan-dim);
    }
    .info-card-text { font-size: 0.85rem; color: var(--grey); line-height: 1.8; }
    .info-card-text .highlight { color: var(--cyan); font-weight: bold; }

    /* ═══ MARQUEE ═══ */
    .marquee-wrap {
      overflow: hidden; padding: 12px 0; border-top: 2px solid #1e2a3a;
      border-bottom: 2px solid #1e2a3a; background: var(--dark);
    }
    .dark-marquee { background: var(--dark-2); }
    .marquee-track {
      display: flex; gap: 0; white-space: nowrap;
      animation: marqueeScroll 30s linear infinite;
    }
    .marquee-track.reverse { animation-direction: reverse; }
    @keyframes marqueeScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-item {
      font-family: var(--font-display); font-size: 0.9rem; color: var(--grey-dark);
      text-transform: uppercase; letter-spacing: 2px; padding: 0 32px;
      display: inline-flex; align-items: center; gap: 32px;
    }
    .marquee-dot {
      display: inline-block; width: 5px; height: 5px; background: var(--cyan);
      border-radius: 50%; opacity: 0.5;
    }

    /* ═══ STATS ═══ */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 48px; }
    .stat-card {
      padding: 24px; border: 2px solid #1e2a3a; background: var(--dark-2);
      box-shadow: var(--shadow-sm); text-align: center; transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--cyan); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--cyan-dim); }
    .stat-number { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); color: var(--cyan); line-height: 1; }
    .stat-label { font-size: 0.65rem; color: var(--grey); text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; }

    /* ═══ SKILLS ═══ */
    .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .skill-group {
      padding: 24px; border: 2px solid #1e2a3a; background: var(--dark-3);
      box-shadow: var(--shadow-sm); transition: all 0.2s;
    }
    .skill-group:hover { border-color: var(--cyan-dim); }
    .skill-group-title {
      font-family: var(--font-display); font-size: 0.75rem; color: var(--cyan);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      padding: 5px 12px; font-size: 0.7rem; border: 1px solid #1e2a3a;
      background: var(--dark-2); color: var(--grey); transition: all 0.2s;
    }
    .skill-tag:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ═══ PROJECTS ═══ */
    .project-card {
      display: grid; grid-template-columns: auto 1fr auto; gap: 24px;
      padding: 32px; border: 2px solid #1e2a3a; background: var(--dark-2);
      box-shadow: var(--shadow); margin-bottom: 24px; transition: all 0.2s ease;
      align-items: start;
    }
    .project-card:hover { border-color: var(--cyan); transform: translate(3px,3px); box-shadow: 3px 3px 0 #000; }
    .project-num { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); color: var(--dark-3); line-height: 1; -webkit-text-stroke: 1px #2a3a4a; }
    .project-title { font-family: var(--font-display); font-size: clamp(0.9rem, 2vw, 1.2rem); color: var(--white); text-transform: uppercase; margin-bottom: 8px; }
    .project-desc { font-size: 0.75rem; color: var(--grey); line-height: 1.7; margin-bottom: 14px; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .project-tag {
      padding: 4px 10px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--cyan); border: 1px solid var(--cyan-dim); background: rgba(0, 229, 255, 0.05);
    }
    .project-cta {
      display: flex; align-items: center; gap: 8px; padding: 10px 20px;
      font-family: var(--font-body); font-size: 0.7rem; font-weight: 700;
      color: var(--dark); background: var(--cyan); border: 2px solid #000;
      box-shadow: var(--shadow-sm); text-decoration: none; text-transform: uppercase;
      white-space: nowrap; transition: all 0.15s ease; align-self: start;
    }
    .project-cta:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }

    /* ═══ LEETCODE ═══ */
    .leetcode-panel {
      padding: 32px; border: 2px solid #1e2a3a; background: var(--dark-2);
      box-shadow: var(--shadow); transition: all 0.2s;
    }
    .leetcode-panel:hover { border-color: var(--cyan); }
    .leetcode-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .leetcode-logo { display: flex; align-items: center; gap: 10px; }
    .leetcode-logo svg { width: 32px; height: 32px; }
    .leetcode-username { font-family: var(--font-display); font-size: 1.2rem; color: var(--cyan); text-transform: uppercase; }
    .leetcode-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .lc-stat { padding: 16px; border: 2px solid #1e2a3a; background: var(--dark-3); text-align: center; }
    .lc-stat.easy .lc-num { color: #00b8a3; }
    .lc-stat.medium .lc-num { color: #ffc01e; }
    .lc-stat.hard .lc-num { color: #ef4743; }
    .lc-num { font-family: var(--font-display); font-size: 1.8rem; line-height: 1; }
    .lc-label { font-size: 0.65rem; color: var(--grey); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
    .lc-loading { font-size: 0.8rem; color: var(--grey); text-align: center; padding: 16px; }
    .lc-link {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
      font-family: var(--font-body); font-size: 0.75rem; font-weight: 700;
      color: var(--dark); background: var(--cyan); border: 2px solid #000;
      box-shadow: var(--shadow-sm); text-decoration: none; text-transform: uppercase;
      transition: all 0.15s ease;
    }
    .lc-link:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }
    .lc-total { font-family: var(--font-display); font-size: 2.5rem; color: var(--white); text-align: center; margin-bottom: 4px; }
    .lc-total-label { font-size: 0.65rem; color: var(--grey); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 20px; }

    /* ═══ TIMELINE ═══ */
    .timeline { background: var(--dark-2); }
    .timeline-line { position: relative; padding-left: 40px; border-left: 3px solid #1e2a3a; margin-left: 20px; }
    .timeline-item {
      position: relative; padding: 24px; border: 2px solid #1e2a3a;
      background: var(--dark-3); box-shadow: var(--shadow-sm); margin-bottom: 32px;
      transition: all 0.2s ease;
    }
    .timeline-item:hover { border-color: var(--cyan); transform: translate(3px,3px); box-shadow: 2px 2px 0 #000; }
    .timeline-item::before {
      content: ''; position: absolute; left: -50px; top: 30px;
      width: 14px; height: 14px; background: var(--cyan); border: 3px solid var(--dark);
    }
    .timeline-type { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--cyan); margin-bottom: 4px; }
    .timeline-title { font-family: var(--font-display); font-size: 0.9rem; color: var(--white); text-transform: uppercase; margin-bottom: 4px; }
    .timeline-org { font-size: 0.75rem; color: var(--grey); margin-bottom: 8px; }
    .timeline-date { font-size: 0.65rem; color: var(--cyan-dim); letter-spacing: 1px; }

    /* ═══ CERTIFICATES ═══ */
    .cert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .cert-card {
      position: relative; padding: 32px 24px; border: 2px solid #1e2a3a;
      background: var(--dark-2); box-shadow: var(--shadow); overflow: hidden;
      transition: all 0.2s ease; cursor: pointer;
    }
    .cert-card:hover { border-color: var(--cyan); transform: translate(3px,3px); box-shadow: 3px 3px 0 #000; }
    .cert-bg-num {
      position: absolute; top: -10px; right: -5px; font-family: var(--font-display);
      font-size: 6rem; color: rgba(0,229,255,0.03); line-height: 1; pointer-events: none;
    }
    .cert-title { font-family: var(--font-display); font-size: 0.8rem; color: var(--white); text-transform: uppercase; margin-bottom: 8px; position: relative; }
    .cert-issuer { font-size: 0.7rem; color: var(--grey); margin-bottom: 4px; }
    .cert-date { font-size: 0.65rem; color: var(--cyan); }

    /* ═══ ACHIEVEMENTS ═══ */
    .achievement-card {
      padding: 28px; border: 2px solid #1e2a3a; background: var(--dark-2);
      box-shadow: var(--shadow-sm); margin-bottom: 20px; transition: all 0.2s;
      display: flex; gap: 20px; align-items: start;
    }
    .achievement-card:hover { border-color: var(--cyan-dim); }
    .achievement-icon { font-size: 2rem; flex-shrink: 0; margin-top: 2px; }
    .achievement-title { font-family: var(--font-display); font-size: 0.9rem; color: var(--cyan); text-transform: uppercase; margin-bottom: 4px; }
    .achievement-date { font-size: 0.65rem; color: var(--grey); letter-spacing: 1px; margin-bottom: 8px; }
    .achievement-desc { font-size: 0.75rem; color: var(--grey); line-height: 1.7; }

    /* ═══ CONTACT ═══ */
    .contact { background: var(--dark-2); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .contact-heading { font-family: var(--font-display); font-size: clamp(1.2rem, 3vw, 1.8rem); color: var(--white); text-transform: uppercase; margin-bottom: 16px; line-height: 1.3; }
    .contact-heading .cyan { color: var(--cyan); }
    .contact-text { font-size: 0.8rem; color: var(--grey); line-height: 1.8; }
    .contact-form { display: flex; flex-direction: column; gap: 16px; }
    .form-input, .form-textarea {
      width: 100%; padding: 14px 16px; font-family: var(--font-body); font-size: 0.8rem;
      color: var(--light); background: var(--dark-3); border: 2px solid #1e2a3a; outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--cyan); }
    .form-textarea { resize: vertical; min-height: 120px; }
    .form-submit {
      padding: 14px 28px; font-family: var(--font-body); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--dark); background: var(--cyan);
      border: 2px solid #000; box-shadow: var(--shadow); cursor: pointer;
      transition: all 0.15s ease; align-self: flex-start;
    }
    .form-submit:hover { transform: translate(3px,3px); box-shadow: 3px 3px 0 #000; }

    /* ═══ FOOTER ═══ */
    .footer { padding: 32px; border-top: 2px solid #1a2030; text-align: center; background: var(--dark); }
    .footer p { font-size: 0.7rem; color: var(--grey-dark); }
    .footer .cyan { color: var(--cyan); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hero-grid { grid-template-columns: 1fr; gap: 60px; text-align: left; }
      .hero-socials { justify-content: flex-start; }
      .hero-right { order: 2; height: 300px; }
      .info-card { max-width: 100%; padding: 24px; }
      .skills-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .project-card { grid-template-columns: 1fr; }
      .project-num { display: none; }
      .project-cta { align-self: flex-start; }
      .contact-grid { grid-template-columns: 1fr; }
      .timeline-line { margin-left: 10px; padding-left: 30px; }
      .section { padding: 60px 0; }
      .leetcode-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div id="root"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
      "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
